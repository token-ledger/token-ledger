name: Deploy to Amazon ECR (Multi-Container)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  # 1. 방금 테라폼으로 만든 애플리케이션 창고 이름으로 변경!
  ECR_REPOSITORY_APP: token-ledger-app

  # 🚨 아래 3개는 아직 테라폼으로 안 만들었으므로 임시로 놔둡니다.
  ECR_REPOSITORY_GRAFANA: token-ledger-grafana
  ECS_CLUSTER: token-ledger-cluster
  ECS_SERVICE: token-ledger-test-app-task-service

jobs:
  deploy:
    name: Dual Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 3. Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------
      # 4-1. 🚀 샘플 앱(Spring Boot) 빌드 및 푸시
      # (실제 경로인 token-ledger-sample-app은 그대로 유지합니다!)
      # ---------------------------------------------------------
      - name: 4-1. Build and Push Spring Boot App
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f token-ledger-sample-app/Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:latest .
          
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:latest

      - name: 4-2. Build and Push Custom Grafana
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f token-ledger-sample-app/grafana/Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:latest \
            ./token-ledger-sample-app/grafana
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:latest

      - name: 5. Deploy to Amazon ECS (Force New Deployment)
        run: |
          echo "ECS 서비스를 최신 이미지들로 업데이트합니다..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment