name: Deploy to Amazon ECR

on:
  push:
    branches:
      - main # ⭐️ main 브랜치에 코드가 합쳐지면(Push) 자동으로 트럭이 출발합니다!

env:
  AWS_REGION: us-east-1             # 서울 리전
  ECR_REPOSITORY: token-ledger-sample-app # AWS ECR 창고 이름 (나중에 AWS에서 만들 이름)

  ECS_CLUSTER: monitoring-cluster    # 예: 모니터링을 위해 만든 클러스터 이름
  ECS_SERVICE: token-ledger-test-app-task-service  # 예: 클러스터 안에서 돌아가고 있는 서비스 이름

jobs:
  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code (최신 코드 가져오기)
        uses: actions/checkout@v4

      - name: 2. Configure AWS credentials (AWS 출입증 인증)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 3. Login to Amazon ECR (창고 문 열기)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 4. Build, tag, and push image to Amazon ECR (밀키트 제작 및 업로드)
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "도커 이미지를 빌드합니다 (Commit Hash & Latest 태그)..."
          # 커밋 해시 버전과 latest 버전 두 개를 동시에 빌드합니다.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          echo "AWS ECR 창고로 두 태그 모두 전송합니다..."
          # 고유 번호(Hash) 버전 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # 최신판(latest) 버전 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. ECS 서비스에 강제 업데이트 명령 내리기
      - name: Deploy to Amazon ECS (Force New Deployment)
        run: |
          echo "ECS 서비스 업데이트를 시작합니다..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
          echo "✅ ECS 배포 명령 전송 완료! (AWS에서 롤링 업데이트가 시작됩니다)"