name: Deploy to Amazon ECR (Multi-Container)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY_APP: token-ledger-app
  ECR_REPOSITORY_GRAFANA: token-ledger-grafana
  # [추가] 프로메테우스 창고 이름 환경변수
  ECR_REPOSITORY_PROMETHEUS: token-ledger-prometheus

  ECS_CLUSTER: token-ledger-cluster
  ECS_SERVICE: token-ledger-test-app-task-service

jobs:
  deploy:
    name: Multi-Container Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 3. Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4-1. 스프링 부트 앱 빌드 및 푸시
      - name: 4-1. Build and Push Spring Boot App
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f token-ledger-sample-app/Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_APP }}:latest

      # 4-2. 커스텀 그라파나 빌드 및 푸시
      - name: 4-2. Build and Push Custom Grafana
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f token-ledger-sample-app/grafana/Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:latest \
            ./token-ledger-sample-app/grafana
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_GRAFANA }}:latest

      # [추가] 4-3. 커스텀 프로메테우스 빌드 및 푸시
      - name: 4-3. Build and Push Custom Prometheus
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f token-ledger-sample-app/prometheus/Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_PROMETHEUS }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_PROMETHEUS }}:latest \
            ./token-ledger-sample-app/prometheus
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_PROMETHEUS }}:latest

      # 5. ECS 서비스 업데이트 배포 자동화
      - name: 5. Deploy to Amazon ECS (Force New Deployment)
        run: |
          echo "ECS 서비스를 최신 이미지들로 업데이트합니다..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
          echo "✅ 배포 명령 전송 완료!"